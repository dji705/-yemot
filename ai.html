<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בוט AI - סמארטפון</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-[320px] h-[600px] bg-white rounded-[40px] shadow-2xl border-[8px] border-gray-800 overflow-hidden flex flex-col">
        
        <!-- Header -->
        <div class="h-6 bg-black flex justify-between items-center px-6">
            <span id="clock" class="text-white text-[10px]">17:13</span>
            <div class="w-16 h-3 bg-gray-800 rounded-b-lg"></div>
        </div>

        <header class="bg-[#075e54] text-white p-4 shadow-md text-right">
            <h1 class="text-sm font-bold">עוזר אישי חכם</h1>
        </header>

        <!-- Chat Area -->
        <main id="chat-window" class="flex-1 overflow-y-auto p-4 chat-bg flex flex-col space-y-3">
            <div class="self-start bg-white p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-[13px]">
                שלום! אני הבוט שלך. כיצד אוכל לסייע?
            </div>
        </main>

        <!-- Input Area -->
        <footer class="bg-white p-2 border-t flex items-center gap-2">
            <input id="user-input" type="text" placeholder="הקלד הודעה..." class="flex-1 p-2 rounded-full bg-gray-100 border border-gray-200 focus:outline-none text-sm">
            <button onclick="sendMessage()" class="bg-[#075e54] text-white p-2 rounded-full">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </footer>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 60000);

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const text = inputField.value.trim();
            if (!text) return;

            // הוספת הודעת משתמש
            chatWindow.innerHTML += `<div class="self-end bg-[#dcf8c6] p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[85%] text-[13px]">${text}</div>`;
            inputField.value = "";
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // שליחה לשרת (החלף את ה-URL לכתובת השרת שלך)
            try {
                const response = await fetch('http://localhost:3000/api/yemot-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();
                chatWindow.innerHTML += `<div class="self-start bg-white p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-[13px]">${data.reply}</div>`;
            } catch (err) {
                chatWindow.innerHTML += `<div class="self-start bg-red-100 p-3 rounded-2xl shadow-sm text-[13px]">שגיאת חיבור לשרת</div>`;
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
